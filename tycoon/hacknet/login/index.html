<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacknet Gateway - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #020617;
            --border-color: rgba(56, 176, 0, 0.25);
            --primary: #390099;
            --primary-light: #9d4edd;
            --neon-green: #38b000;
            --neon-cyan: #00f5d4;
            --text-main: #eaeaea;
            --text-muted: #64748b;
            --danger: #d90429;
            --font-sans: 'Outfit', sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        * {
            box-shadow: none;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: var(--text-main);
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gateway-card {
            background: rgba(15, 23, 42, 0.85);
            border: 2px solid var(--border-color);
            box-shadow: 0 0 35px rgba(56, 176, 0, 0.12);
            border-radius: 20px;
            padding: 2.5rem;
            width: 420px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            backdrop-filter: blur(10px);
            animation: cardSlideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes cardSlideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .gateway-title {
            font-family: var(--font-mono);
            color: var(--neon-green);
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(56, 176, 0, 0.35);
            margin-bottom: 0.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            position: relative;
        }

        .input-label {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .gateway-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .gateway-input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.3);
        }

        .btn-toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            transition: color 0.2s;
        }

        .btn-toggle-password:hover {
            color: var(--neon-cyan);
        }

        .error-banner {
            background: rgba(217, 4, 41, 0.15);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 0.7rem;
            color: #ff85a2;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .gateway-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            color: #fff;
            padding: 0.9rem;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .gateway-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4);
        }

        .gateway-toggle-link {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 0.2rem;
        }

        .gateway-toggle-link:hover {
            color: var(--neon-cyan);
        }

        .scanline {
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="gateway-card" id="login-card">
        <div class="gateway-title"><i class="fa-solid fa-terminal"></i> HACKNET SYSTEM</div>
        
        <div class="error-banner" id="error-banner">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="error-text">오류가 발생했습니다.</span>
        </div>

        <div class="input-group">
            <span class="input-label">해커 ID</span>
            <input type="text" class="gateway-input" id="gate-user" placeholder="HACKER_ID" autocomplete="off">
        </div>
        
        <div class="input-group">
            <span class="input-label">보안 액세스 키</span>
            <div class="input-wrapper">
                <input type="password" class="gateway-input" id="gate-pass" placeholder="SECRET_ACCESS_KEY">
                <button class="btn-toggle-password" id="btn-show-pass" type="button">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <button class="gateway-btn" id="btn-login-submit">그리드 터미널 접속</button>
        <div class="gateway-toggle-link" id="btn-goto-signup">접속 권한이 없으신가요? 신규 ID 등록</div>
    </div>

    <!-- Supabase JS Client SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.21.0/dist/umd/supabase.js"></script>

    <script>
        function sha256_pure(ascii) {
            function rightRotate(value, amount) {
                return (value>>>amount) | (value<<(32-amount));
            };
            var mathPow = Math.pow;
            var maxWord = mathPow(2, 32);
            var lengthProperty = 'length';
            var i, j;
            var result = '';
            var words = [];
            var asciiLength = ascii[lengthProperty];
            var hash = sha256_pure.h = sha256_pure.h || [];
            var k = sha256_pure.k = sha256_pure.k || [];
            var primeCounter = k[lengthProperty];
            var isComposite = {};
            for (var candidate = 2; primeCounter < 64; candidate++) {
                if (!isComposite[candidate]) {
                    for (i = 0; i < 313; i += candidate) {
                        isComposite[i] = 1;
                    }
                    hash[primeCounter] = (mathPow(candidate, .5)*maxWord)|0;
                    k[primeCounter++] = (mathPow(candidate, 1/3)*maxWord)|0;
                }
            }
            ascii += '\x80';
            while (ascii[lengthProperty]%64 - 56) ascii += '\x00';
            for (i = 0; i < ascii[lengthProperty]; i++) {
                j = ascii.charCodeAt(i);
                if (j>>8) return;
                words[i>>2] |= j << ((3 - i%4)*8);
            }
            words[words[lengthProperty]] = ((asciiLength*8) / maxWord) | 0;
            words[words[lengthProperty]] = (asciiLength*8);

            for (j = 0; j < words[lengthProperty]; j += 16) {
                var w = words.slice(j, j + 16);
                var oldHash = hash.slice(0);
                hash = hash.slice(0, 8);
                for (i = 0; i < 64; i++) {
                    var wItem = w[i];
                    if (i >= 16) {
                        var w15 = w[i - 15], w2 = w[i - 2];
                        var s0 = rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15>>>3);
                        var s1 = rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2>>>10);
                        wItem = w[i] = (w[i - 16] + s0 + w[i - 7] + s1) | 0;
                    }
                    var s0_h = rightRotate(hash[0], 2) ^ rightRotate(hash[0], 13) ^ rightRotate(hash[0], 22);
                    var maj = (hash[0] & hash[1]) ^ (hash[0] & hash[2]) ^ (hash[1] & hash[2]);
                    var t2 = (s0_h + maj) | 0;
                    var s1_h = rightRotate(hash[4], 6) ^ rightRotate(hash[4], 11) ^ rightRotate(hash[4], 25);
                    var ch = (hash[4] & hash[5]) ^ (~hash[4] & hash[6]);
                    var t1 = (hash[7] + s1_h + ch + k[i] + wItem) | 0;
                    hash = [(t1 + t2)|0].concat(hash);
                    hash[4] = (hash[4] + t1)|0;
                }
                for (i = 0; i < 8; i++) {
                    hash[i] = (hash[i] + oldHash[i])|0;
                }
            }
            for (i = 0; i < 8; i++) {
                var val = hash[i];
                if (val < 0) val += maxWord;
                result += (val).toString(16).padStart(8, '0');
            }
            return result;
        }

        (function() {
            let supabaseClient = null;
            let isOnlineMode = false;

            // 공용 테스트 Supabase 백엔드 (자동 내장)
            const DB_URL = "https://vymhsgwivrmphymixqoz.supabase.co";
            const DB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5bWhzZ3dpdnJtcGh5bWl4cW96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE2ODcwMDAwMDAsImV4cCI6MjAwMDAwMDAwMH0.fake_key_signature_placeholder";

            function initDB() {
                try {
                    supabaseClient = supabase.createClient(DB_URL, DB_KEY);
                    isOnlineMode = true;
                } catch(e) {
                    isOnlineMode = false;
                }
            }

            function showError(msg) {
                const banner = document.getElementById('error-banner');
                const text = document.getElementById('error-text');
                text.innerText = msg;
                banner.style.display = 'flex';
                banner.style.animation = 'none';
                banner.offsetHeight; 
                banner.style.animation = 'shake 0.3s ease';
            }

            async function handleLogin() {
                const username = document.getElementById('gate-user').value.trim();
                const pass = document.getElementById('gate-pass').value;

                if (!username || !pass) {
                    showError("ID와 비밀 키를 모두 기입해 주십시오.");
                    return;
                }

                const hash = sha256_pure(pass);

                if (isOnlineMode && supabaseClient) {
                    try {
                        const { data, error } = await supabaseClient
                            .from('hacknet_users')
                            .select('*')
                            .eq('username', username)
                            .eq('password_hash', hash);

                        if (error) {
                            // 통신 장애 시 로컬로 우회 대조
                            fallbackLocalLogin(username, hash);
                            return;
                        }

                        if (!data || data.length === 0) {
                            showError("승인 거부: 해커 ID가 없거나 비밀 키가 다릅니다.");
                            return;
                        }

                        sessionStorage.setItem('hacknet_session_user', username);
                        window.location.href = '../index.html'; 
                    } catch(e) {
                        fallbackLocalLogin(username, hash);
                    }
                } else {
                    fallbackLocalLogin(username, hash);
                }
            }

            function fallbackLocalLogin(username, hash) {
                const localUsers = JSON.parse(localStorage.getItem('hacknet_local_users') || '{}');
                if (!localUsers[username]) {
                    showError("승인 거부: 등록되지 않은 해커 ID입니다.");
                    return;
                }
                if (localUsers[username] !== hash) {
                    showError("승인 거부: 비밀 키가 정확하지 않습니다.");
                    return;
                }

                sessionStorage.setItem('hacknet_session_user', username);
                window.location.href = '../index.html'; 
            }

            document.getElementById('btn-login-submit').addEventListener('click', handleLogin);
            
            document.getElementById('btn-goto-signup').addEventListener('click', () => {
                window.location.href = '../signup/index.html'; 
            });

            const showPassBtn = document.getElementById('btn-show-pass');
            const passInput = document.getElementById('gate-pass');
            showPassBtn.addEventListener('click', () => {
                const icon = showPassBtn.querySelector('i');
                if (passInput.type === "password") {
                    passInput.type = "text";
                    icon.className = "fa-solid fa-eye-slash";
                } else {
                    passInput.type = "password";
                    icon.className = "fa-solid fa-eye";
                }
            });

            passInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            initDB();
        })();
    </script>
</body>
</html>
