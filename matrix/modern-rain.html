<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Matrix Rain</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initDrops();
        }
        
        window.addEventListener('resize', resizeCanvas);

        // Broad Unicode generation similar to unicode.html, but curated
        const charArray = [];
        for (let i = 0x21; i <= 0x3000; i++) {
            // Exclude large blocks of non-symbolic/hieroglyphic letters like Hangul (0xAC00-0xD7AF) 
            // and Chinese (0x3400+), and focus on the requested symbols/ancient scripts.
            if (i >= 0x0E00 && i <= 0x169F) continue; // Various SE Asian scripts
            if (i >= 0x3400) break; // Start of Chinese blocks
            
            const ch = String.fromCharCode(i);
            // Skip empty/whitespace/control chars
            if (ch.trim() === '') continue;
            
            charArray.push(ch);
        }
        // Add Full-width Roman and Symbols
        for (let i = 0xFF01; i <= 0xFF5E; i++) {
            charArray.push(String.fromCharCode(i));
        }

        let drops = [];

        function initDrops() {
            const step = 9; // Even denser
            const columns = Math.floor(canvas.width / step);
            drops = [];
            for (let i = 0; i < columns; i++) {
                const fontSize = Math.floor(Math.random() * 8) + 7; // 7px to 15px (smaller)
                const speed = (fontSize / 10) * 4.5; // Fast
                
                drops.push({
                    x: i * step,
                    y: Math.random() * -300, // Very staggered
                    fontSize: fontSize,
                    speed: speed,
                    history: []
                });
            }
        }

        resizeCanvas();

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drops.forEach(drop => {
                drop.y += drop.speed * 0.15;

                const char = charArray[Math.floor(Math.random() * charArray.length)];
                drop.history.push({ char: char, y: Math.floor(drop.y * 20) });
                
                if (drop.history.length > 18) {
                    drop.history.shift();
                }

                drop.history.forEach((point, index) => {
                    const isLast = index === drop.history.length - 1;
                    const alpha = (index / drop.history.length);
                    
                    if (isLast) {
                        ctx.fillStyle = '#fff';
                    } else {
                        ctx.fillStyle = `rgba(0, 255, 70, ${alpha})`;
                    }

                    ctx.font = drop.fontSize + 'px monospace';
                    ctx.fillText(point.char, Math.floor(drop.x), point.y);
                });

                if (drop.y * 20 > canvas.height + 200) {
                    drop.y = Math.random() * -20;
                    drop.history = [];
                }
            });
        }

        setInterval(draw, 16);
    </script>
</body>
</html>
