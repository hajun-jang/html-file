<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Matrix Rain</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initDrops();
        }
        
        window.addEventListener('resize', resizeCanvas);

        // Curated symbolic and ancient-style character ranges
        const charArray = [];
        const ranges = [
            [0x0021, 0x007E], // Basic Latin (English, Numbers, Symbols)
            [0x00A1, 0x00FF], // Latin-1 Symbols
            [0x0370, 0x03FF], // Greek
            [0x16A0, 0x16EA], // Runic (Hieroglyph-like)
            [0x2C00, 0x2C5E], // Glagolitic (Ancient symbolic look)
            [0x2100, 0x214F], // Letterlike Symbols
            [0x2200, 0x22FF], // Mathematical Operators
            [0x2500, 0x259F], // Box Drawing & Blocks
            [0x25A0, 0x25FF], // Geometric Shapes
            [0x2600, 0x26FF], // Miscellaneous Symbols
            [0x2700, 0x27BF], // Dingbats
            [0x30A0, 0x30FF], // Katakana
            [0xFF01, 0xFF5E]  // Full-width Roman & Symbols
        ];

        for (const [start, end] of ranges) {
            for (let i = start; i <= end; i++) {
                charArray.push(String.fromCharCode(i));
            }
        }

        let drops = [];

        function initDrops() {
            // Higher density (smaller step)
            const step = 10; 
            const columns = Math.floor(canvas.width / step);
            drops = [];
            for (let i = 0; i < columns; i++) {
                // Smaller font sizes
                const fontSize = Math.floor(Math.random() * 10) + 8; // 8px to 18px
                const speed = (fontSize / 12) * 4; // Higher speed
                
                drops.push({
                    x: i * step,
                    y: Math.random() * -200, // More staggered entry
                    fontSize: fontSize,
                    speed: speed,
                    history: []
                });
            }
        }

        resizeCanvas();

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drops.forEach(drop => {
                drop.y += drop.speed * 0.12;

                // Constant updates for more activity
                const char = charArray[Math.floor(Math.random() * charArray.length)];
                drop.history.push({ char: char, y: Math.floor(drop.y * 20) });
                
                if (drop.history.length > 20) {
                    drop.history.shift();
                }

                drop.history.forEach((point, index) => {
                    const isLast = index === drop.history.length - 1;
                    const alpha = (index / drop.history.length);
                    
                    if (isLast) {
                        ctx.fillStyle = '#fff';
                    } else {
                        ctx.fillStyle = `rgba(0, 255, 70, ${alpha})`;
                    }

                    ctx.font = drop.fontSize + 'px monospace';
                    ctx.fillText(point.char, Math.floor(drop.x), point.y);
                });

                if (drop.y * 20 > canvas.height + 100) {
                    drop.y = Math.random() * -15;
                    drop.history = [];
                }
            });
        }

        setInterval(draw, 16); // Even faster refresh (~60fps)
    </script>
</body>
</html>
