<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Matrix Rain</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initDrops();
        }
        
        window.addEventListener('resize', resizeCanvas);

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜｦﾝ';
        const charArray = chars.split('');

        let drops = [];

        function initDrops() {
            // Calculate columns based on width and a fixed step to prevent overlap
            const step = 15;
            const columns = Math.floor(canvas.width / step);
            drops = [];
            for (let i = 0; i < columns; i++) {
                const fontSize = Math.floor(Math.random() * 12) + 12; // 12px to 24px
                const speed = (fontSize / 15) * 2; 
                
                drops.push({
                    x: i * step,
                    y: Math.random() * -100,
                    fontSize: fontSize,
                    speed: speed,
                    history: []
                });
            }
        }

        resizeCanvas();

        function draw() {
            // Clear screen completely for maximum sharpness
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drops.forEach(drop => {
                // Update position
                drop.y += drop.speed * 0.2;

                // Add to history
                if (Math.random() > 0.5) { // Slow down char update slightly for readability
                    const char = charArray[Math.floor(Math.random() * charArray.length)];
                    drop.history.push({ char: char, y: Math.floor(drop.y * 20) });
                }
                
                if (drop.history.length > 25) {
                    drop.history.shift();
                }

                // Draw each point in the history
                drop.history.forEach((point, index) => {
                    const isLast = index === drop.history.length - 1;
                    const alpha = (index / drop.history.length);
                    
                    if (isLast) {
                        ctx.fillStyle = '#fff'; // Sharp white tip
                    } else {
                        // Vary green based on position in trail
                        ctx.fillStyle = `rgba(0, 255, 70, ${alpha})`;
                    }

                    ctx.font = drop.fontSize + 'px monospace';
                    // Math.floor for sharp pixel-perfect rendering
                    ctx.fillText(point.char, Math.floor(drop.x), point.y);
                });

                // Reset drop when it goes off screen
                if (drop.y * 20 > canvas.height + 500) {
                    drop.y = -10;
                    drop.history = [];
                }
            });
        }

        // Increase FPS for smoother animation
        setInterval(draw, 20);
    </script>
</body>
</html>
