<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Matrix Rain</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initDrops();
        }
        
        window.addEventListener('resize', resizeCanvas);

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜｦﾝ';
        const charArray = chars.split('');

        let drops = [];

        function initDrops() {
            const columns = Math.floor(canvas.width / 10);
            drops = [];
            for (let i = 0; i < columns; i++) {
                // Individual column settings for depth
                const fontSize = Math.floor(Math.random() * 15) + 10; // 10px to 25px
                const speed = (fontSize / 15) * 1.5; // Larger is faster
                const opacity = (fontSize / 25) * 0.8 + 0.2; // Larger is brighter
                
                drops.push({
                    x: i * 15,
                    y: Math.random() * -100, // Staggered start
                    fontSize: fontSize,
                    speed: speed,
                    opacity: opacity,
                    history: [] // To track the trail for the white tip
                });
            }
        }

        resizeCanvas();

        function draw() {
            // Semi-transparent black for the trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drops.forEach(drop => {
                // Update history for the trail
                const char = charArray[Math.floor(Math.random() * charArray.length)];
                drop.history.push({ char: char, y: drop.y * 20 });
                
                // Keep only the last 20 characters for the trail
                if (drop.history.length > 20) {
                    drop.history.shift();
                }

                // Draw the trail
                drop.history.forEach((point, index) => {
                    const isLast = index === drop.history.length - 1;
                    
                    if (isLast) {
                        ctx.fillStyle = '#fff'; // White tip
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = '#fff';
                    } else {
                        ctx.fillStyle = `rgba(0, 255, 70, ${drop.opacity * (index / drop.history.length)})`;
                        ctx.shadowBlur = 0;
                    }

                    ctx.font = drop.fontSize + 'px monospace';
                    ctx.fillText(point.char, drop.x, point.y);
                });

                // Reset drop
                if (drop.y * 20 > canvas.height && Math.random() > 0.975) {
                    drop.y = -5;
                    drop.history = [];
                }
                
                drop.y += drop.speed * 0.5;
            });
        }

        setInterval(draw, 33);
    </script>
</body>
</html>
